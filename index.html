const { useState, useRef, useEffect } = React;

function useMob() {

}

const COLORS = [

/* ─── QUICK INPUT HELPERS ───────────────────────── */
function Stepper({ value, onChange, min = 1, max = 999 }) {
  const m = useMob();
  const btnStyle = {
    width: m ? 38 : 28, height: m ? 46 : 34, background: C.accentBg,
    border: `1px solid ${C.border}`, borderRadius: 6, cursor: "pointer",
    fontSize: m ? 18 : 14, fontWeight: 700, color: C.accent,
    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
  };
  return (
    <div style={{ display: "flex", gap: 2, alignItems: "center" }}>
      <button style={btnStyle} onClick={() => onChange(Math.max(min, value - 1))}>−</button>
      <input type="number" style={{ ...si(m), width: m ? 56 : 46, textAlign: "center", padding: "4px" }}
        value={value} min={min} max={max} onChange={e => onChange(Math.max(min, +e.target.value))} />
      <button style={btnStyle} onClick={() => onChange(Math.min(max, value + 1))}>+</button>
    </div>
  );
}

// Parse sneltekst: "45x70 800x5 1200x3" or "800 5\n1200 3" or Excel paste
function parseSneltekst(text, kopmaten) {
  const lines = text.split(/[\n;]/).map(s => s.trim()).filter(Boolean);
  const items = [];
  for (const line of lines) {
    // Tab-separated (Excel): kopmaat\tlengte\taantal or lengte\taantal
    const parts = line.split(/\t|,/).map(s => s.trim());
    if (parts.length >= 2) {
      const isKm = (s) => /^\d+[x×]\d+$/.test(s.trim());
      if (parts.length >= 3 && isKm(parts[0])) {
        // kopmaat, lengte, aantal
        items.push({ kopmaat: parts[0].trim(), lengte: parseInt(parts[1]), aantal: parseInt(parts[2]) || 1 });
        continue;
      }
      if (parts.length >= 2 && !isNaN(+parts[0]) && !isNaN(+parts[1])) {
        // lengte, aantal
        items.push({ kopmaat: "", lengte: parseInt(parts[0]), aantal: parseInt(parts[1]) || 1 });
        continue;
      }
    }
    // Space-separated tokens: optionally starts with kopmaat
    const tokens = line.split(/\s+/);
    let ki = 0;
    let km = "";
    if (tokens[ki] && /^\d+[x×]\d+$/.test(tokens[ki])) { km = tokens[ki++]; }
    // remaining: lengte x antal pairs like 800x5 or just 800
    while (ki < tokens.length) {
      const tok = tokens[ki++];
      const mLx = tok.match(/^(\d+)[x×](\d+)$/);
      if (mLx) {
        items.push({ kopmaat: km, lengte: parseInt(mLx[1]), aantal: parseInt(mLx[2]) });
      } else if (/^\d+$/.test(tok)) {
        const len = parseInt(tok);
        // next token could be aantal
        let aantal = 1;
        if (tokens[ki] && /^\d+$/.test(tokens[ki]) && parseInt(tokens[ki]) < 100) {
          aantal = parseInt(tokens[ki++]);
        }
        items.push({ kopmaat: km, lengte: len, aantal });
      }
    }
  }
  return items.filter(it => it.lengte > 0);
}

function QuickInput({ mode, kopmaten, onAdd, placeholder }) {
  const m = useMob();
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [parsed, setParsed] = useState([]);

  const parse = (t) => {
    setText(t);
    const items = parseSneltekst(t, kopmaten);
    setParsed(items);
  };

  const confirm = () => {
    onAdd(parsed);
    setText(""); setParsed([]); setOpen(false);
  };

  return (
    <>
      <button onClick={() => setOpen(o => !o)} style={{ ...sd(m), display: "flex", alignItems: "center", gap: 5 }}>
        ⚡ Sneltekst
      </button>
      {open && (
        <div style={{ gridColumn: "1 / -1", background: C.accentBg, border: `1px solid #EDD9B0`, borderRadius: 10, padding: 14, marginTop: 4 }}>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 8, lineHeight: 1.7 }}>
            Typ of plak je lijst. Formaten:
            <span style={{ fontFamily: "monospace", marginLeft: 6 }}>45x70 800x5 1200x3</span> of
            <span style={{ fontFamily: "monospace", marginLeft: 6 }}>800⇥5</span> (Excel-kolommen) of
            <span style={{ fontFamily: "monospace", marginLeft: 6 }}>800,3</span> (komma)
          </div>
          <textarea
            style={{ ...si(m), height: 90, resize: "vertical", fontFamily: "monospace", marginBottom: 8 }}
            placeholder={placeholder}
            value={text}
            onChange={e => parse(e.target.value)}
          />
          {parsed.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.green, fontWeight: 700, marginBottom: 5 }}>✓ {parsed.length} regels herkend:</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {parsed.map((it, i) => (
                  <div key={i} style={{ fontSize: 11, fontFamily: "monospace", background: C.greenBg, border: "1px solid #B0D9C0", borderRadius: 5, padding: "3px 8px", color: C.green }}>
                    {mode === "plaat"
                      ? `${it.label||"?"} ${it.breedte}×${it.hoogte}mm ×${it.aantal}`
                      : `${it.kopmaat||"—"} ${it.lengte}mm ×${it.aantal}`}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={confirm} disabled={!parsed.length}
              style={{ ...sb(C.accent, "#fff", m), opacity: parsed.length ? 1 : 0.4 }}>
              + Toevoegen aan lijst
            </button>
            <button onClick={() => { setText(""); setParsed([]); setOpen(false); }} style={sd(m)}>Annuleer</button>
          </div>
        </div>
      )}
    </>
  );
}

/* ─── ALGORITHMS ───────────────────────────────── */
function cut1D(items, stockLen, kerf, kopVerlies = 0) {
  const all = [];
  items.forEach(it => { for (let i = 0; i < it.aantal; i++) all.push({ len: +it.lengte, id: it.id }); });
  all.sort((a, b) => b.len - a.len);
  const bins = [], errs = [];
  const effectiveLen = stockLen - kopVerlies; // eerste stukje is afval
  for (const p of all) {
    if (p.len > effectiveLen) { errs.push(`${p.len}mm past niet in ${stockLen}mm (na ${kopVerlies}mm kopverlies: ${effectiveLen}mm beschikbaar)`); continue; }
    let placed = false;
    for (const b of bins) {
      const need = p.len + (b.cuts.length ? kerf : 0);
      if (b.rem >= need) { b.rem -= need; b.cuts.push(p); placed = true; break; }
    }
    if (!placed) bins.push({ stockLen, kopVerlies, cuts: [p], rem: effectiveLen - p.len });
  }
  return { bins, errs };
}

function cut2D(items, sw, sh, kerf) {
  const all = [];
  items.forEach(it => { for (let i = 0; i < it.aantal; i++) all.push({ w: +it.breedte, h: +it.hoogte, label: it.label || `${it.breedte}x${it.hoogte}` }); });
  all.sort((a, b) => b.w * b.h - a.w * a.h);
  const sheets = [], errs = [];
  for (const p of all) {
    const ok = p.w <= sw && p.h <= sh, okr = p.h <= sw && p.w <= sh;
    if (!ok && !okr) { errs.push(`"${p.label}" past niet op plaat`); continue; }
    let placed = false;
    for (const s of sheets) { if (guill(s, p, kerf)) { placed = true; break; } }
    if (!placed) { const s = { w: sw, h: sh, cuts: [], spaces: [{ x: 0, y: 0, w: sw, h: sh }] }; sheets.push(s); guill(s, p, kerf); }
  }
  return { sheets, errs };
}

function guill(sheet, p, kerf) {
  for (let i = 0; i < sheet.spaces.length; i++) {
    const sp = sheet.spaces[i];
    let fw, fh, rot = false;
    if (p.w <= sp.w && p.h <= sp.h)      { fw = p.w; fh = p.h; }
    else if (p.h <= sp.w && p.w <= sp.h) { fw = p.h; fh = p.w; rot = true; }
    else continue;
    sheet.cuts.push({ x: sp.x, y: sp.y, w: fw, h: fh, label: p.label + (rot ? " ↻" : "") });
    const ns = [];
    if (sp.w - fw - kerf > 0 && fh > 0) ns.push({ x: sp.x + fw + kerf, y: sp.y, w: sp.w - fw - kerf, h: fh });
    if (sp.h - fh - kerf > 0)           ns.push({ x: sp.x, y: sp.y + fh + kerf, w: sp.w, h: sp.h - fh - kerf });
    sheet.spaces.splice(i, 1, ...ns);
    return true;
  }
  return false;
}

function parseKm(s) {
  const p = String(s).replace(/[x×\s]/gi, "x").split("x").map(Number);
  return p.length === 2 && !isNaN(p[0]) && !isNaN(p[1]) && p[0] > 0 && p[1] > 0 ? p : null;
}

function matchKm(str, kopmaten) {
  const gw = parseKm(str);
  if (!gw) return null;
  const [gA, gB] = [Math.min(...gw), Math.max(...gw)];
  let best = null, bestA = Infinity;
  for (const k of kopmaten) {
    const kp = parseKm(k.kopmaat);
    if (!kp) continue;
    const [kA, kB] = [Math.min(...kp), Math.max(...kp)];
    if (kA >= gA && kB >= gB && kA * kB < bestA) { bestA = kA * kB; best = k; }
  }
  return best;
}

function Lbl({ children }) {

/* ─── CUT BAR ──────────────────────────────────── */
function CutBar({ bin, colorById, kerf }) {
  const VW = 560, VH = 44;
  const sc = VW / bin.stockLen;
  const kv = (bin.kopVerlies || 0) * sc; // kopverlies offset
  let cx = kv;
  const segs = bin.cuts.map((c, i) => {
    const kw = i ? kerf * sc : 0, x = cx + kw, w = c.len * sc;
    cx = x + w;
    return { x, w, color: colorById[c.id] || "#999", label: String(c.len) };
  });
  const wx = cx, ww = VW - cx;
  return (
    <svg viewBox={`0 0 ${VW} ${VH}`} style={{ width: "100%", borderRadius: 6, display: "block", border: `1px solid ${C.border}` }}>
      <defs><pattern id="htch" patternUnits="userSpaceOnUse" width={6} height={6} patternTransform="rotate(45)"><line y2={6} stroke="#D8D4CE" strokeWidth={3} /></pattern></defs>
      <rect width={VW} height={VH} fill={C.inpBg} rx={5} />
      {/* kopverlies */}
      {kv > 0 && <>
        <rect x={0} y={3} width={kv - 0.5} height={VH - 6} fill={C.redBg} stroke={C.red} strokeWidth={0.5} rx={2} opacity={0.7} />
        {kv > 24 && <text x={kv / 2} y={VH / 2 + 4} textAnchor="middle" fontSize={9} fill={C.red} fontFamily="monospace">{bin.kopVerlies}mm</text>}
      </>}
      {segs.map((s, i) => (
        <g key={i}>
          <rect x={s.x} y={3} width={Math.max(s.w - 0.5, 0)} height={VH - 6} fill={s.color} rx={2} opacity={0.85} />
          {s.w > 28 && <text x={s.x + s.w / 2} y={VH / 2 + 4} textAnchor="middle" fontSize={10} fill="rgba(255,255,255,.95)" fontFamily="monospace" fontWeight="700">{s.label}</text>}
        </g>
      ))}
      {ww > 2 && <>
        <rect x={wx} y={3} width={ww} height={VH - 6} fill="url(#htch)" rx={2} />
        {ww > 36 && <text x={wx + ww / 2} y={VH / 2 + 4} textAnchor="middle" fontSize={9} fill={C.faint} fontFamily="monospace">{bin.rem}mm</text>}
      </>}
    </svg>
  );
}

/* ─── SHEET VIS ─────────────────────────────────── */
function SheetVis({ sheet, idx }) {
  const MW = 480, MH = 270;
  const sc = Math.min(MW / sheet.w, MH / sheet.h);
  const W = sheet.w * sc, H = sheet.h * sc;
  const used = sheet.cuts.reduce((s, c) => s + c.w * c.h, 0);
  const waste = ((1 - used / (sheet.w * sheet.h)) * 100).toFixed(1);
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 6, fontFamily: "monospace" }}>Plaat #{idx + 1} — {sheet.w}x{sheet.h}mm — Afval: {waste}%</div>
      <svg width={W} height={H} style={{ display: "block", borderRadius: 8, border: `1px solid ${C.border}`, maxWidth: "100%" }}>
        <defs><pattern id={`h2-${idx}`} patternUnits="userSpaceOnUse" width={8} height={8} patternTransform="rotate(45)"><line y2={8} stroke="#D8D4CE" strokeWidth={3} /></pattern></defs>
        <rect width={W} height={H} fill={C.inpBg} />
        <rect width={W} height={H} fill={`url(#h2-${idx})`} opacity={0.5} />
        {sheet.cuts.map((c, i) => (
          <g key={i}>
            <rect x={c.x * sc} y={c.y * sc} width={c.w * sc - 0.5} height={c.h * sc - 0.5} fill={COLORS[i % COLORS.length]} stroke="#fff" strokeWidth={1} rx={2} opacity={0.88} />
            {c.w * sc > 36 && c.h * sc > 18 && <text x={(c.x + c.w / 2) * sc} y={(c.y + c.h / 2) * sc + 4} textAnchor="middle" fontSize={9} fill="rgba(255,255,255,.95)" fontFamily="monospace" fontWeight="600">{c.label}</text>}
          </g>
        ))}
      </svg>
    </div>
  );
}

/* ─── STATS ─────────────────────────────────────── */
function Stats({ items }) {
  return (
    <div className="stats-grid" style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 18 }}>
      {items.map(([l, v]) => (
        <div key={l} style={{ background: C.accentBg, border: "1px solid #EDD9B0", borderRadius: 8, padding: "11px 14px", flex: "1 1 120px" }}>
          <div style={{ fontSize: 10, color: C.muted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 4 }}>{l}</div>
          <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Roboto Mono', monospace", color: C.accent }}>{v}</div>
        </div>
      ))}
    </div>
  );
}

/* ─── RESULTS 1D ────────────────────────────────── */
function Results1D({ results, colorById, allItems, kerf }) {
  if (!results) return null;
  // Only show errors if all results have no bins
  const allEmpty = results.every(r => !r.bins.length);
  if (allEmpty) {
    return (
      <Card title="Zaagplan Resultaten">
        {results.flatMap(r => r.errs || []).map((e, i) => <Err key={i} msg={e} />)}
      </Card>
    );
  }
  const totalBins  = results.reduce((s, r) => s + r.bins.length, 0);
  const totalWaste = results.reduce((s, r) => r.bins.reduce((ss, b) => ss + b.rem, 0) + s, 0);
  const totalLen   = results.reduce((s, r) => r.bins.reduce((ss, b) => ss + b.stockLen, 0) + s, 0);
  return (
    <Card title="Zaagplan Resultaten">
      <Stats items={[
        ["Stukken hout", totalBins],
        ["Totaal afval", `${totalWaste}mm`],
        ["Benutting", `${((1 - totalWaste / totalLen) * 100).toFixed(1)}%`],
        ["Zaagblad", `${kerf}mm`],
      ]} />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 18 }}>
        {allItems.filter(it => it.lengte && it.aantal).map(it => (
          <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 6, background: C.inpBg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 10px" }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: colorById[it.id], flexShrink: 0 }} />
            <span style={{ fontSize: 13, color: C.muted, fontFamily: "monospace" }}>{it.lengte}mm ×{it.aantal}</span>
          </div>
        ))}
      </div>
      {results.map((res, ri) => (
        <div key={ri} style={{ marginBottom: 26 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
            <div style={{ height: 3, width: 18, background: C.accent, borderRadius: 2 }} />
            <span style={{ fontSize: 16, fontWeight: 700, color: C.accent }}>{res.kopmaat} — {res.stockLen}mm</span>
            <span style={{ fontSize: 13, color: C.muted, background: C.inpBg, border: `1px solid ${C.border}`, borderRadius: 5, padding: "2px 8px", fontFamily: "monospace" }}>{res.bins.length} stuk{res.bins.length !== 1 ? "s" : ""}</span>
          </div>
          {(res.errs || []).map((e, i) => <Err key={i} msg={e} />)}
          {res.bins.map((bin, bi) => (
            <div key={bi} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.faint, marginBottom: 5, fontFamily: "monospace" }}>
                Stuk #{bi + 1} · Afval: {bin.rem}mm ({(bin.rem / bin.stockLen * 100).toFixed(1)}%) · {bin.cuts.map(c => c.len + "mm").join(" + ")}
              </div>
              <CutBar bin={bin} colorById={colorById} kerf={kerf} />
            </div>
          ))}
        </div>
      ))}
    </Card>
  );
}

/* ─── FOTO SCAN ─────────────────────────────────── */
function FotoScan({ mode, kopmaten, onResult }) {
  const m = useMob();
  const [open, setOpen]       = useState(false);
  const [screen, setScreen]   = useState("keuze"); // keuze | camera | preview | laden | resultaat
  const [imgB64, setImgB64]   = useState(null);
  const [imgUrl, setImgUrl]   = useState(null);
  const [preview, setPreview] = useState(null);
  const [err, setErr]         = useState(null);

  const fileRef   = useRef();
  const videoRef  = useRef();
  const streamRef = useRef();
  const canvasRef = useRef();

  const reset = () => {
    stopCam();
    setScreen("keuze"); setImgB64(null); setImgUrl(null); setPreview(null); setErr(null);
  };
  const close = () => { reset(); setOpen(false); };

  const stopCam = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
  };

  // Start camera
  const startCamera = async () => {
    setErr(null); setScreen("camera");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
    } catch (e) {
      setErr("Camera niet beschikbaar: " + e.message);
      setScreen("keuze");
    }
  };

  // Snap photo from video
  const snapPhoto = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
    const b64 = dataUrl.split(",")[1];
    stopCam();
    setImgUrl(dataUrl); setImgB64(b64); setScreen("preview");
  };

  // Load from file
  const onFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setErr(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setImgUrl(dataUrl); setImgB64(dataUrl.split(",")[1]); setScreen("preview");
    };
    reader.readAsDataURL(file);
  };

  // Analyse with Claude
  const analyse = async () => {
    if (!imgB64) return;
    setScreen("laden"); setErr(null);
    const kmLijst = kopmaten.filter(k => k.kopmaat).map(k => k.kopmaat).join(", ") || "geen";
    const prompts = {
      kortlijst: `Analyseer deze afbeelding en extraheer ALLE houtdelen. Beschikbare kopmaten: ${kmLijst}. Antwoord ALLEEN als JSON-array zonder uitleg of markdown:\n[{"kopmaat":"45x70","lengte":1200,"aantal":2},...]`,
      latten:    `Analyseer deze afbeelding en extraheer ALLE latten. Beschikbare kopmaten: ${kmLijst}. Antwoord ALLEEN als JSON-array zonder uitleg of markdown:\n[{"gewensteMaat":"40x60","lengte":800,"aantal":1},...]`,
      plaat:     `Analyseer deze afbeelding en extraheer ALLE plaatdelen. Antwoord ALLEEN als JSON-array zonder uitleg of markdown:\n[{"label":"Zijwand","breedte":400,"hoogte":600,"aantal":2},...]`,
    };
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imgB64 } },
            { type: "text", text: prompts[mode] }
          ]}]
        })
      });
      const data = await resp.json();
      const text = (data.content?.find(b => b.type === "text")?.text || "").replace(/```json|```/gi, "").trim();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed) || !parsed.length) throw new Error("Geen items gevonden.");
      setPreview(parsed); setScreen("resultaat");
    } catch (e) {
      setErr("Kon afbeelding niet verwerken: " + e.message);
      setScreen("preview");
    }
  };

  const confirm = () => {
    onResult(preview); close();
  };

  const labelMap = { kortlijst: "Kortlijst", latten: "Latten", plaat: "Plaatmateriaal" };
  const btnBase = { display: "flex", alignItems: "center", justifyContent: "center", gap: 6 };

  return (
    <>
      <button onClick={() => { setOpen(true); reset(); }} style={{ ...sd(m), ...btnBase }}>
        📷 Scan foto
      </button>

      {open && (
        <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div onClick={close} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.55)" }} />
          <div style={{ position: "relative", background: C.surface, borderRadius: 14, width: m ? "97vw" : 500, maxWidth: "97vw", maxHeight: "92vh", overflowY: "auto", boxShadow: "0 8px 40px rgba(0,0,0,.3)", display: "flex", flexDirection: "column" }}>

            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", background: C.header, borderBottom: `1px solid ${C.border}`, borderRadius: "14px 14px 0 0", flexShrink: 0 }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: C.text }}>📷 Scan — {labelMap[mode]}</span>
              <button onClick={close} style={{ ...sx(false), border: "none", padding: "3px 10px", fontSize: 16 }}>✕</button>
            </div>

            <div style={{ padding: 18, flex: 1 }}>

              {/* ── KEUZE ── */}
              {screen === "keuze" && (
                <div>
                  <p style={{ fontSize: 13, color: C.muted, marginBottom: 18, lineHeight: 1.6 }}>
                    Maak een foto met de camera of upload een bestaande afbeelding. De AI leest de afmetingen automatisch uit.
                  </p>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    <button onClick={startCamera} style={{ ...sb(C.accent, "#fff", true), ...btnBase, flexDirection: "column", padding: "20px 12px", borderRadius: 10, fontSize: 15, gap: 8 }}>
                      <span style={{ fontSize: 32 }}>📷</span>
                      Camera
                    </button>
                    <button onClick={() => fileRef.current?.click()} style={{ ...sb(C.surface, C.muted, true, { border: `1px solid ${C.border}` }), ...btnBase, flexDirection: "column", padding: "20px 12px", borderRadius: 10, fontSize: 15, gap: 8 }}>
                      <span style={{ fontSize: 32 }}>🖼</span>
                      Upload foto
                    </button>
                  </div>
                  <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={onFile} />
                  {err && <Err msg={err} />}
                </div>
              )}

              {/* ── CAMERA ── */}
              {screen === "camera" && (
                <div>
                  <div style={{ position: "relative", borderRadius: 10, overflow: "hidden", background: "#000", marginBottom: 14 }}>
                    <video ref={videoRef} autoPlay playsInline muted style={{ width: "100%", display: "block", maxHeight: 340, objectFit: "cover" }} />
                    {/* Viewfinder overlay */}
                    <div style={{ position: "absolute", inset: 0, border: "2px solid rgba(192,122,24,.6)", borderRadius: 10, pointerEvents: "none" }} />
                  </div>
                  <canvas ref={canvasRef} style={{ display: "none" }} />
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={snapPhoto} style={{ ...sb(C.accent, "#fff", true), flex: 1, ...btnBase, fontSize: 18, padding: "14px" }}>
                      📸 Foto maken
                    </button>
                    <button onClick={() => { stopCam(); setScreen("keuze"); }} style={{ ...sd(true) }}>
                      ← Terug
                    </button>
                  </div>
                </div>
              )}

              {/* ── PREVIEW ── */}
              {screen === "preview" && (
                <div>
                  <img src={imgUrl} alt="preview" style={{ width: "100%", borderRadius: 8, display: "block", marginBottom: 14, maxHeight: 300, objectFit: "contain", background: C.inpBg }} />
                  {err && <Err msg={err} />}
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={analyse} style={{ ...sb(C.accent, "#fff", true), flex: 1, ...btnBase }}>
                      🔍 Analyseer foto
                    </button>
                    <button onClick={() => setScreen("keuze")} style={{ ...sd(true) }}>← Opnieuw</button>
                  </div>
                </div>
              )}

              {/* ── LADEN ── */}
              {screen === "laden" && (
                <div style={{ textAlign: "center", padding: "32px 0" }}>
                  <div style={{ fontSize: 40, marginBottom: 14 }}>⏳</div>
                  <div style={{ fontSize: 15, color: C.muted }}>Afbeelding analyseren...</div>
                  <img src={imgUrl} alt="" style={{ width: "100%", borderRadius: 8, marginTop: 16, opacity: 0.4, maxHeight: 200, objectFit: "contain" }} />
                </div>
              )}

              {/* ── RESULTAAT ── */}
              {screen === "resultaat" && preview && (
                <div>
                  <img src={imgUrl} alt="" style={{ width: "100%", borderRadius: 8, display: "block", marginBottom: 14, maxHeight: 200, objectFit: "contain", background: C.inpBg }} />
                  <div style={{ background: C.greenBg, border: "1px solid #B0D9C0", borderRadius: 8, padding: 12, marginBottom: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.green, marginBottom: 8 }}>✓ {preview.length} item{preview.length !== 1 ? "s" : ""} gevonden:</div>
                    {preview.map((it, i) => (
                      <div key={i} style={{ fontSize: 12, fontFamily: "monospace", color: C.text, padding: "3px 0", borderBottom: i < preview.length - 1 ? `1px solid ${C.border}` : "none" }}>
                        {mode === "kortlijst" && `${it.kopmaat || "?"} · ${it.lengte}mm · ×${it.aantal}`}
                        {mode === "latten"    && `${it.gewensteMaat || "?"} · ${it.lengte}mm · ×${it.aantal}`}
                        {mode === "plaat"     && `${it.label || "?"} · ${it.breedte}×${it.hoogte}mm · ×${it.aantal}`}
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={confirm} style={{ ...sb(C.green, "#fff", true), flex: 1, ...btnBase }}>✓ Toevoegen aan lijst</button>
                    <button onClick={() => setScreen("preview")} style={{ ...sd(true) }}>← Opnieuw</button>
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      )}
    </>
  );
}

function ZaaglijstPage({ items, setItems, results, onCalc, kopmaten, kerf, opgeslagen = [] }) {
  const m = useMob();
  const upd = (id, k, v) => setItems(a => a.map(x => x.id === id ? { ...x, [k]: v } : x));
  const colorById = Object.fromEntries(items.map((it, i) => [it.id, COLORS[i % COLORS.length]]));

  const getLens = km => {
    const k = kopmaten.find(k => k.kopmaat === km);
    return k && k.lengtes ? k.lengtes.split(",").map(s => +s.trim()).filter(Boolean) : [];
  };
  const onKm = (id, km) => {
    const opts = getLens(km);
    setItems(a => a.map(x => x.id === id ? { ...x, kopmaat: km, stockLength: opts[0] || 0 } : x));
  };
  const onGewenste = (id, gm) => {
    const match = matchKm(gm, kopmaten);
    const lens = match ? getLens(match.kopmaat) : [];
    setItems(a => a.map(x => x.id === id ? { ...x, gewensteMaat: gm, matchedKopmaat: match ? match.kopmaat : "", stockLength: lens[0] || 0 } : x));
  };
  const onMode = (id, mode) => {
    setItems(a => a.map(x => x.id === id
      ? { ...x, mode, kopmaat: "", stockLength: 0, gewensteMaat: "", matchedKopmaat: "" }
      : x));
  };

  // Mobile: compact row rendering
  const MobRow = ({ it }) => {
    const isAuto = it.mode === "auto";
    const lOpts  = getLens(isAuto ? it.matchedKopmaat : it.kopmaat);
    const match  = isAuto ? matchKm(it.gewensteMaat, kopmaten) : null;
    const matchOk = !!match;

    return (
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", marginBottom: 8, display: "flex", flexDirection: "column", gap: 8 }}>
        {/* Row 1: color dot + mode + kopmaat + voorraad */}
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ width: 12, height: 12, borderRadius: 3, background: colorById[it.id], flexShrink: 0, marginTop: 1 }} />
          {/* Mode toggle */}
          <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
            {["vast","auto"].map(mo => (
              <button key={mo} onClick={() => onMode(it.id, mo)} style={{
                padding: "5px 9px", borderRadius: 5, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: `1px solid ${it.mode === mo ? C.accent : C.border}`,
                background: it.mode === mo ? C.accentBg : C.inpBg,
                color: it.mode === mo ? C.accent : C.faint,
              }}>{mo === "vast" ? "V" : "A"}</button>
            ))}
          </div>
          {/* Kopmaat / gewenste maat */}
          {isAuto ? (
            <input
              style={{ ...si(true), flex: 1, fontSize: 15, minHeight: 40 }}
              value={it.gewensteMaat} placeholder="b×h (bijv. 60x85)"
              onChange={e => onGewenste(it.id, e.target.value)}
            />
          ) : (
            <select style={{ ...ss(true), flex: 1, fontSize: 15, minHeight: 40 }}
              value={it.kopmaat} onChange={e => onKm(it.id, e.target.value)}>
              <option value="">Kopmaat...</option>
              {kopmaten.filter(k => k.kopmaat).map(k => (
                <option key={k.id} value={k.kopmaat}>{k.kopmaat}</option>
              ))}
            </select>
          )}
          {/* Delete */}
          <button style={{ ...sx(true), padding: "8px 12px", flexShrink: 0 }}
            onClick={() => setItems(a => a.filter(x => x.id !== it.id))}>✕</button>
        </div>

        {/* Auto match feedback */}
        {isAuto && it.gewensteMaat && (
          <div style={{ fontSize: 13, fontFamily: "monospace", padding: "6px 10px", borderRadius: 6,
            background: matchOk ? C.greenBg : C.redBg,
            border: `1px solid ${matchOk ? "#B0D9C0" : "#E8C0BB"}`,
            color: matchOk ? C.green : C.red }}>
            {matchOk ? `✓ ${match.kopmaat}` : "Geen match"}
          </div>
        )}

        {/* Row 2: voorraad lengte + gewenste lengte + aantal */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 8, alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 10, color: C.faint, letterSpacing: 1, marginBottom: 3, textTransform: "uppercase" }}>Voorraad</div>
            <select style={{ ...ss(true), fontSize: 14, minHeight: 44 }}
              value={it.stockLength}
              onChange={e => upd(it.id, "stockLength", +e.target.value)}
              disabled={isAuto ? !matchOk : !it.kopmaat}>
              <option value="0">—</option>
              {lOpts.map(sl => <option key={sl} value={sl}>{sl}mm</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 10, color: C.faint, letterSpacing: 1, marginBottom: 3, textTransform: "uppercase" }}>Lengte (mm)</div>
            <input type="number" inputMode="numeric"
              style={{ ...si(true), fontSize: 16, minHeight: 44, fontFamily: "monospace", fontWeight: 700 }}
              value={it.lengte} min={1}
              onChange={e => upd(it.id, "lengte", +e.target.value)} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <div style={{ fontSize: 10, color: C.faint, letterSpacing: 1, textTransform: "uppercase" }}>Aantal</div>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <button style={{ width: 36, height: 44, background: C.inpBg, border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 20, fontWeight: 700, color: C.accent, cursor: "pointer" }}
                onClick={() => upd(it.id, "aantal", Math.max(1, it.aantal - 1))}>−</button>
              <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "monospace", color: C.text, minWidth: 28, textAlign: "center" }}>{it.aantal}</div>
              <button style={{ width: 36, height: 44, background: C.inpBg, border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 20, fontWeight: 700, color: C.accent, cursor: "pointer" }}
                onClick={() => upd(it.id, "aantal", it.aantal + 1)}>+</button>
            </div>
          </div>
        </div>

        {/* Duplicate button */}
        <button style={{ ...sd(true), fontSize: 13, padding: "6px 0", textAlign: "center" }}
          onClick={() => setItems(a => [...a, { ...it, id: uid() }])}>⎘ Dupliceer rij</button>
      </div>
    );
  };

  // Desktop row
  const DeskRow = ({ it }) => {
    const isAuto = it.mode === "auto";
    const lOpts  = getLens(isAuto ? it.matchedKopmaat : it.kopmaat);
    const match  = isAuto ? matchKm(it.gewensteMaat, kopmaten) : null;
    const matchOk = !!match;
    const matchStyle = {
      padding: "7px 10px", borderRadius: 6, fontSize: 12, fontFamily: "monospace",
      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
      background: matchOk ? C.greenBg : it.gewensteMaat ? C.redBg : C.surface,
      border: `1px solid ${matchOk ? "#B0D9C0" : it.gewensteMaat ? "#E8C0BB" : C.border}`,
      color: matchOk ? C.green : it.gewensteMaat ? C.red : C.faint,
    };
    return (
      <div style={{ display: "grid", gridTemplateColumns: "12px 70px 2fr 2fr 160px auto 26px 26px", gap: "0 6px", marginBottom: 7, alignItems: "center" }}>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: colorById[it.id] }} />
        <div style={{ display: "flex", gap: 3 }}>
          {["vast","auto"].map(mo => (
            <button key={mo} onClick={() => onMode(it.id, mo)} style={{
              flex: 1, padding: "4px 3px", borderRadius: 5, cursor: "pointer",
              border: `1px solid ${it.mode === mo ? C.accent : C.border}`,
              background: it.mode === mo ? C.accentBg : C.surface,
              color: it.mode === mo ? C.accent : C.faint,
              fontWeight: 700, fontSize: 11,
            }}>{mo === "vast" ? "V" : "A"}</button>
          ))}
        </div>
        {isAuto
          ? <input style={si(false)} value={it.gewensteMaat} placeholder="b×h mm" onChange={e => onGewenste(it.id, e.target.value)} />
          : <select style={ss(false)} value={it.kopmaat} onChange={e => onKm(it.id, e.target.value)}>
              <option value="">Kopmaat...</option>
              {kopmaten.filter(k => k.kopmaat).map(k => <option key={k.id} value={k.kopmaat}>{k.kopmaat}</option>)}
            </select>
        }
        {isAuto
          ? <div style={{ ...matchStyle, minHeight: 34 }}>{match ? `✓ ${match.kopmaat}` : it.gewensteMaat ? "Geen match" : "—"}</div>
          : <select style={ss(false)} value={it.stockLength} onChange={e => upd(it.id, "stockLength", +e.target.value)} disabled={!it.kopmaat}>
              <option value="0">Voorraad...</option>
              {lOpts.map(sl => <option key={sl} value={sl}>{sl}mm</option>)}
            </select>
        }
        {isAuto
          ? <select style={ss(false)} value={it.stockLength} onChange={e => upd(it.id, "stockLength", +e.target.value)} disabled={!matchOk}>
              <option value="0">Voorraad...</option>
              {lOpts.map(sl => <option key={sl} value={sl}>{sl}mm</option>)}
            </select>
          : <input type="number" style={si(false)} value={it.lengte} min={1} onChange={e => upd(it.id, "lengte", +e.target.value)} />
        }
        {isAuto
          ? <input type="number" style={si(false)} value={it.lengte} min={1} onChange={e => upd(it.id, "lengte", +e.target.value)} />
          : <Stepper value={it.aantal} onChange={v => upd(it.id, "aantal", v)} />
        }
        {isAuto
          ? <Stepper value={it.aantal} onChange={v => upd(it.id, "aantal", v)} />
          : <button title="Dup" style={{ ...sx(false), color: C.accent, borderColor: C.accent, fontSize: 13, padding: "4px 7px" }} onClick={() => setItems(a => [...a, { ...it, id: uid() }])}>⎘</button>
        }
        {isAuto
          ? <button title="Dup" style={{ ...sx(false), color: C.accent, borderColor: C.accent, fontSize: 13, padding: "4px 7px" }} onClick={() => setItems(a => [...a, { ...it, id: uid() }])}>⎘</button>
          : <button style={sx(false)} onClick={() => setItems(a => a.filter(x => x.id !== it.id))}>✕</button>
        }
      </div>
    );
  };

  const newItem = (mode = "vast") => {
    // Pre-fill kopmaat with first available, and stockLength
    const firstKm = kopmaten.find(k => k.kopmaat);
    const firstSl = firstKm?.lengtes ? +firstKm.lengtes.split(",")[0].trim() : 0;
    return {
      id: uid(), mode,
      kopmaat: mode === "vast" ? (firstKm?.kopmaat || "") : "",
      stockLength: mode === "vast" ? firstSl : 0,
      gewensteMaat: "", matchedKopmaat: "", lengte: 1000, aantal: 1,
    };
  };

  return (
    <div>
      <Card title="Zaaglijst">
        {!kopmaten.filter(k => k.kopmaat).length && <Warn msg="Voeg eerst kopmaten toe via Instellingen." />}

        {/* Desktop header */}
        {!m && items.length > 0 && (
          <div style={{ display: "grid", gridTemplateColumns: "12px 70px 2fr 2fr 160px auto 26px 26px", gap: "0 6px", marginBottom: 6 }}>
            {["", "Modus", "Kopmaat / Gewenst", "Match / Voorraad", "Voorraad / Lengte", "Lengte / Aantal", "", ""].map((h, i) => <Lbl key={i}>{h}</Lbl>)}
          </div>
        )}

        {items.map(it => m
          ? <MobRow key={it.id} it={it} />
          : <DeskRow key={it.id} it={it} />
        )}

        {items.length === 0 && (
          <div style={{ color: C.faint, fontSize: 14, marginBottom: 12, fontStyle: "italic", textAlign: m ? "center" : "left", padding: m ? "20px 0" : 0 }}>
            Nog geen regels. Klik + om te beginnen.
          </div>
        )}

        {/* Buttons */}
        <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap", alignItems: "flex-start" }}>
          {m ? (
            // Mobile: big prominent add buttons
            <>
              <button style={{ ...sb(C.accent, "#fff", true), flex: 1, fontSize: 17, padding: "14px 10px" }}
                onClick={() => setItems(a => [...a, newItem("vast")])}>
                + Vast kopmaat
              </button>
              <button style={{ ...sb(C.surface, C.accent, true, { border: `1.5px solid ${C.accent}` }), flex: 1, fontSize: 17, padding: "14px 10px" }}
                onClick={() => setItems(a => [...a, newItem("auto")])}>
                + Auto match
              </button>
            </>
          ) : (
            <>
              <button style={sd(false)} onClick={() => setItems(a => [...a, newItem("vast")])}>+ Vast</button>
              <button style={sd(false)} onClick={() => setItems(a => [...a, newItem("auto")])}>+ Auto</button>
            </>
          )}
          <QuickInput mode="kortlijst" kopmaten={kopmaten} placeholder={"45x70 800x5 1200x3\nof plak uit Excel"} onAdd={rows => {
            const gl = km => { const k = kopmaten.find(k => k.kopmaat === km); return k && k.lengtes ? k.lengtes.split(",").map(s => +s.trim()).filter(Boolean) : []; };
            setItems(a => [...a, ...rows.map(r => ({ id: uid(), mode: "vast", kopmaat: r.kopmaat || "", stockLength: gl(r.kopmaat)[0] || 0, gewensteMaat: "", matchedKopmaat: "", lengte: r.lengte || 0, aantal: r.aantal || 1 }))]);
          }} />

/* ─── PRINT VIEW ───────────────────────────────── */
function PrintCutBar({ bin, kerf }) {
  const VW = 500, VH = 34;
  const sc = VW / bin.stockLen;
  let cx = 0;
  const segs = bin.cuts.map((c, i) => {
    const kw = i ? kerf * sc : 0, x = cx + kw, w = c.len * sc;
    cx = x + w;
    return { x, w, color: COLORS[i % COLORS.length], label: String(c.len) };
  });
  const wx = cx, ww = VW - cx;
  return (
